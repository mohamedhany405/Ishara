name: ishara_app
description: "Ishara – accessible ESL assistant and safety companion."
publish_to: "none"
version: 1.0.0+1

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/ishara_app_logo.png"
  adaptive_icon_background: "#000000"

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  ionicons: ^0.2.2

  # Backend & networking
  dio: ^5.7.0
  http: ^1.2.1

  # State management & navigation
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2

  # UI utilities
  awesome_dialog: ^3.2.1
  provider: ^6.0.5
  flutter_launcher_icons: ^0.14.3
  google_sign_in: ^6.1.0
  flutter_facebook_auth: ^7.1.0
  font_awesome_flutter: ^10.5.0
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  lottie: ^3.1.3
  fl_chart: ^0.69.0

  # Animations & motion
  flutter_animate: ^4.5.2
  google_fonts: ^6.1.0

  # Media & device capabilities
  video_player: ^2.9.2
  chewie: ^1.8.5
  youtube_player_flutter: ^9.1.1
  visibility_detector: ^0.4.0+2
  camera: ^0.11.0+2
  permission_handler: ^11.3.1
  image_picker: ^1.1.2
  image: ^4.3.0
  connectivity_plus: ^6.1.2

  # Accessibility & speech
  flutter_tts: ^4.2.2
  speech_to_text: ^7.3.0

  # On-device ML
  tflite_flutter: ^0.11.0
  google_mlkit_text_recognition: ^0.15.0
  google_mlkit_pose_detection: ^0.14.0
  google_mlkit_image_labeling: ^0.14.0
  google_mlkit_object_detection: ^0.15.0

  # Location & sensors
  geolocator: ^13.0.2

  # Hardware / networking utilities (for ESP32 integration)
  web_socket_channel: ^3.0.1

  # URL launching & local storage
  url_launcher: ^6.3.1
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.2.2

  # Local storage for offline cache
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Emergency & messaging
  another_telephony: ^0.4.0
  share_plus: ^10.1.2
  device_info_plus: ^11.1.1

  # Background
  flutter_local_notifications: ^18.0.1

  # Utilities
  equatable: ^2.0.5
  vibration: ^2.0.0
  collection: ^1.18.0
  uuid: ^4.5.1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13

flutter:
  assets:
    - assets/images/ishara_app_logo.png
    - assets/images/splash_logo.png
    - assets/models/
    - assets/models/asl_v6.tflite
    - assets/models/label_map_v6.json
    - assets/models/manifest.json
    - assets/videos/signs/
    - assets/sign_dictionary.json
    - assets/products/
  uses-material-design: true
